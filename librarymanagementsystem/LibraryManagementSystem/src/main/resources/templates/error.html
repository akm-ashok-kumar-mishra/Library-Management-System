<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — Library MS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
	<link rel="shortcut icon" href="https://img.icons8.com/?size=64&id=qJ5bReX2GLFb&format=png" type="image/x-icon">
	    
		<style>
        :root {
            --ink: #0f0e0c; --paper: #f5f0e8; --cream: #ede7d9;
            --gold: #c9a84c; --rust: #b5451b; --navy: #1a2744; --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

        nav { background: var(--navy); padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 2px 16px rgba(0,0,0,0.3); }
        .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); text-decoration: none; }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .nav-links a:hover { background: rgba(201,168,76,0.15); color: #e8c96a; }

        .error-container {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem;
        }
        .error-card {
            background: var(--white); border-radius: 20px;
            box-shadow: 0 8px 40px rgba(15,14,12,0.12);
            border: 1px solid rgba(15,14,12,0.06);
            padding: 3rem; text-align: center; max-width: 500px; width: 100%;
        }
        .error-icon { font-size: 4rem; margin-bottom: 1.25rem; }
        .error-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem; font-weight: 700; color: var(--navy); margin-bottom: 0.75rem;
        }
        .error-message {
            background: rgba(181,69,27,0.07);
            border: 1px solid rgba(181,69,27,0.2);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            color: var(--rust);
            margin: 1.25rem 0 2rem;
            text-align: left;
            word-break: break-word;
        }
        .error-links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .btn-home {
            background: var(--navy); color: var(--white); text-decoration: none;
            padding: 0.75rem 1.75rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-home:hover { background: #253a6e; transform: translateY(-1px); }
        .btn-back {
            background: var(--cream); color: var(--ink); text-decoration: none;
            padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem;
            border: 1px solid rgba(15,14,12,0.1); transition: all 0.2s; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-back:hover { background: #e0d9cc; }

        footer { background: var(--navy); color: rgba(255,255,255,0.4); text-align: center; padding: 1.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">📚 LibraryMS</a>
    <div class="nav-links">
        <a th:href="@{/books}">Books</a>
        <a th:href="@{/students}">Students</a>
        <a th:href="@{/issues}">Issues</a>
		<a th:href="@{/payments}">Payments</a>
    </div>
	
	<form th:action="@{/logout}" method="post" style="display:inline;">
	        <button type="submit"
	                style="background:rgba(181,69,27,0.15);
	                       color:#b5451b; border:1px solid rgba(181,69,27,0.3);
	                       padding:0.45rem 1rem; border-radius:8px;
	                       font-size:0.88rem; font-weight:600;
	                       cursor:pointer; margin-left:0.5rem;">
	            Logout
	        </button>
	    </form>
	</div>
	</nav>
</nav>

<div class="error-container">
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h1>Something went wrong</h1>
        <p style="color:rgba(15,14,12,0.55); font-size:0.9rem;">An error occurred while processing your request.</p>

        <div class="error-message" th:if="${error}" th:text="${error}"></div>
        <div class="error-message" th:unless="${error}">An unexpected error occurred. Please try again.</div>

        <div class="error-links">
            <button class="btn-back" onclick="history.back()">← Go Back</button>
            <a th:href="@{/}" class="btn-home">🏠 Home</a>
        </div>
    </div>
</div>

<footer>&copy; 2025 Library Management System &mdash; Developed by <strong style="color: var(--gold-light);">Ashok Kumar Mishra</strong></footer>
</body>
</html>
